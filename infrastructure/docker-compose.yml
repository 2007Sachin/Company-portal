version: "3.8"

networks:
  pulse-network:
    driver: bridge

services:
  # ──────────────────────────────────────
  # API Gateway — Nginx reverse proxy
  # ──────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: pulse-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - auth-service
      - jd-parser
      - candidate-service
      - pipeline-service
      - notification-service
    restart: unless-stopped
    networks:
      - pulse-network

  # ──────────────────────────────────────
  # Frontend — Next.js
  # ──────────────────────────────────────
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: pulse-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    restart: unless-stopped
    networks:
      - pulse-network

  # ──────────────────────────────────────
  # Auth Service — Node.js / Express
  # ──────────────────────────────────────
  auth-service:
    build:
      context: ../apps/auth-service
      dockerfile: Dockerfile
    container_name: pulse-auth
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped
    networks:
      - pulse-network

  # ──────────────────────────────────────
  # JD Parser Service — Python / FastAPI
  # ──────────────────────────────────────
  jd-parser:
    build:
      context: ../apps/jd-parser-service
      dockerfile: Dockerfile
    container_name: pulse-jd-parser
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - GROQ_API_KEY=${GROQ_API_KEY}
    restart: unless-stopped
    networks:
      - pulse-network

  # ──────────────────────────────────────
  # Candidate Service — Node.js / Express
  # ──────────────────────────────────────
  candidate-service:
    build:
      context: ../apps/candidate-service
      dockerfile: Dockerfile
    container_name: pulse-candidate
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped
    networks:
      - pulse-network

  # ──────────────────────────────────────
  # Pipeline Service — Node.js / Express
  # ──────────────────────────────────────
  pipeline-service:
    build:
      context: ../apps/pipeline-service
      dockerfile: Dockerfile
    container_name: pulse-pipeline
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - NODE_ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped
    networks:
      - pulse-network

  # ──────────────────────────────────────
  # Notification Service — Node.js / Express
  # ──────────────────────────────────────
  notification-service:
    build:
      context: ../apps/notification-service
      dockerfile: Dockerfile
    container_name: pulse-notification
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - NODE_ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped
    networks:
      - pulse-network
