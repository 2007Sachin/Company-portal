# ============================================
# Pulse Platform — Nginx API Gateway
# ============================================
# Routes:
#   /api/auth/*        → auth-service:3001
#   /api/jd/*          → jd-parser:8000
#   /api/candidates/*  → candidate-service:3002
#   /api/pipeline/*    → pipeline-service:3003
#   /api/notify/*      → notification-service:3004
#   /*                 → web:3000  (catch-all)
# ============================================

events {
    worker_connections 1024;
}

http {
    # ── Shared proxy settings ──────────────
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Authorization     $http_authorization;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";

    # ── Upstreams ──────────────────────────
    upstream web {
        server web:3000;
    }

    upstream auth_service {
        server auth-service:3001;
    }

    upstream jd_parser {
        server jd-parser:8000;
    }

    upstream candidate_service {
        server candidate-service:3002;
    }

    upstream pipeline_service {
        server pipeline-service:3003;
    }

    upstream notification_service {
        server notification-service:3004;
    }

    upstream copilot_service {
        server copilot-service:3005;
    }

    # ── Main server ────────────────────────
    server {
        listen 80;
        server_name localhost;

        # ── CORS headers for localhost:3000 ──
        add_header Access-Control-Allow-Origin  "http://localhost:3000" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Preflight requests
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── Auth Service ──────────────────
        location /api/auth {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://auth_service;
        }

        # ── JD Parser Service ─────────────
        location /api/jd {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://jd_parser;
        }

        # ── Candidate + Recruiter Service ─
        location /api/candidates {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://candidate_service;
        }

        location /api/recruiters {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://candidate_service;
        }

        # ── Pipeline Service ──────────────
        location /api/pipeline {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://pipeline_service;
        }

        # ── Notification Service ──────────
        location /api/notify {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://notification_service;
        }

        # ── Copilot Service ───────────────
        # /api/copilot/score-coach  →  copilot-service:3005/copilot/score-coach
        location /api/copilot/ {
            proxy_pass http://copilot_service/copilot/;
        }

        # ── Frontend (catch-all) ──────────
        location / {
            proxy_pass http://web;
        }
    }
}
